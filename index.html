<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barre App - Privacy Policy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px;
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .language-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }
        .btn-sq {
            background: #667eea;
            color: white;
        }
        .btn-sq:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-en {
            background: #764ba2;
            color: white;
        }
        .btn-en:hover {
            background: #653a8a;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(118, 75, 162, 0.4);
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        .app-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Barre App</h1>
        <div class="app-info">
            <p><strong>Privacy Policy & Terms of Service</strong></p>
            <p style="font-size: 0.95em; color: #999;">Choose your language below</p>
        </div>
        
        <p style="font-size: 1.05em; color: #555;">
            A simple task management application for organizing your daily tasks
        </p>

        <div class="language-buttons">
            <a href="sq/privacy.html" class="btn btn-sq">🇦🇱 Shqip</a>
            <a href="en/privacy.html" class="btn btn-en">🇬🇧 English</a>
        </div>

        <div class="footer">
            <p>Barre App © 2024 | All Rights Reserved</p>
            <p>For questions: <strong>[vendos email tëndin]</strong></p>
        </div>
    </div>
</body>
</html>
